<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonxin - Gallery</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Satisfy&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS Variables --- */
        :root {
            --baby-pink: #ffd1dc;
            --baby-yellow: #fff9c4;
            --soft-pink: #ffb6c1;
            --soft-yellow: #fff59d;
            --text-color: #8a5a44;
            --text-dark: #5d4037;
            --white-glass: rgba(255, 255, 255, 0.75);
            --shadow: rgba(138, 90, 68, 0.15);
            --border-radius: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--baby-pink) 0%, var(--baby-yellow) 100%);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            position: relative;
            padding-bottom: 2rem;
        }

        h1, h2, h3, .logo {
            font-family: 'Satisfy', cursive;
            font-weight: 400;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- Background Clouds --- */
        .cloud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            box-shadow: 0 8px 16px var(--shadow);
            opacity: 0.8;
        }

        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .c1 { width: 100px; height: 40px; top: 15%; left: -120px; animation: float 25s infinite linear; }
        .c1::after { width: 50px; height: 50px; top: -25px; left: 15px; }
        .c1::before { width: 40px; height: 40px; top: -15px; left: 50px; }

        .c2 { width: 140px; height: 60px; top: 40%; right: -160px; animation: float 35s infinite linear reverse; }
        .c2::after { width: 70px; height: 70px; top: -35px; left: 25px; }
        .c2::before { width: 60px; height: 60px; top: -25px; left: 65px; }

        /* --- Header --- */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--white-glass);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px var(--shadow);
            padding: 1rem 0;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            animation: bounce 3s infinite ease-in-out;
            text-shadow: 2px 2px 0px white;
        }

        nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            padding: 0.5rem;
        }

        nav a {
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px var(--shadow);
            font-size: 0.9rem;
        }

        nav a:hover, nav a.active {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--shadow);
            color: var(--soft-pink);
        }

        /* --- Gallery Container --- */
        .gallery-container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--white-glass);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px var(--shadow);
            backdrop-filter: blur(5px);
        }

        .gallery-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Image Frame */
        .image-section {
            position: relative;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
        }

        .image-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9; /* Consistent aspect ratio */
            border-radius: 20px;
            overflow: hidden;
            background: white;
            box-shadow: 0 15px 35px var(--shadow);
            border: 8px solid white;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .image-frame:hover {
            transform: scale(1.01);
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures images fill the frame nicely */
            transition: transform 0.5s ease;
        }

        /* Description Overlay */
        .description-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px; /* Inner radius since border is on parent */
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 20;
            backdrop-filter: blur(2px);
        }

        .description-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .overlay-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--soft-pink);
        }

        .overlay-date {
            font-size: 1rem;
            color: #888;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .overlay-description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-color);
        }

        .close-overlay {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--soft-pink);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.5);
            transition: transform 0.2s;
            z-index: 25;
        }

        .close-overlay:hover {
            transform: rotate(90deg);
        }

        /* Navigation Arrows */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            color: var(--soft-pink);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--shadow);
            transition: all 0.3s ease;
            z-index: 15;
            border: 2px solid white;
        }

        .nav-arrow:hover {
            background: var(--soft-pink);
            color: white;
            transform: translateY(-50%) scale(1.1);
        }

        .prev-arrow { left: -25px; }
        .next-arrow { right: -25px; }

        /* Counter */
        .image-counter {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.6);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            box-shadow: 0 2px 10px var(--shadow);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
            background: var(--white-glass);
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 1;
        }

        .hearts {
            margin: 1rem 0;
            font-size: 1.5rem;
            color: var(--soft-pink);
            letter-spacing: 5px;
        }

        /* --- Animations --- */
        @keyframes float {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(100vw); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- Responsive Design --- */
        @media (max-width: 768px) {
            .nav-arrow {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
                top: 105%; /* Move arrows below image on mobile */
                transform: translateY(0);
            }
            
            .nav-arrow:hover {
                transform: scale(1.1);
            }

            .prev-arrow { left: 10%; }
            .next-arrow { right: 10%; }
            
            .image-frame {
                aspect-ratio: 1/1; /* Square on mobile */
            }
            
            .overlay-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <script>

            { id: 21, title: "BOYS || PLANET", date: "Sep 21, 2025", description: "", imageUrl: "images/15.jpg" },

            { id: 23, title: "One Dream Forever", date: "oct 23, 2025", description: "", imageUrl: "images/wx17.jpg" },
            { id: 24, title: "Behind The Drive", date: "oct 24, 2025", description: "", imageUrl: "images/wx18.jpg" },

            { id: 33, title: "Fansites Pictures", date: "Nov 1, 2025", description: "", imageUrl: "images/wx27.jpg" },
            { id: 34, title: "Fansites Pictures", date: "Nov 1, 2025", description: "", imageUrl: "images/wx28.jpg" },
            { id: 35, title: "Mnet Plus Chat Update", date: "oct 13, 2025", description: "", imageUrl: "images/wx29.jpg" },
            { id: 36, title: "Ald1 Instagram Live", date: "oct 12, 2025", description: "", imageUrl: "images/wx30.jpg" },
            { id: 37, title: "Ald1 Instagram Live", date: "oct 12, 2025", description: "", imageUrl: "images/wx31.jpg" }
        ];

        // --- Gallery Functionality ---
        document.addEventListener('DOMContentLoaded', function() {
            const imageFrame = document.querySelector('.image-frame');
            const currentImageSpan = document.getElementById('currentImage');
            const totalImagesSpan = document.getElementById('totalImages');
            const prevArrow = document.querySelector('.prev-arrow');
            const nextArrow = document.querySelector('.next-arrow');
            
            let currentIndex = 0;
            
            // Initialize
            totalImagesSpan.textContent = journeyData.length;
            updateGallery();
            
            // Event Listeners
            prevArrow.addEventListener('click', (e) => { e.stopPropagation(); showPreviousImage(); });
            nextArrow.addEventListener('click', (e) => { e.stopPropagation(); showNextImage(); });
            
            // Keyboard Nav
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft') showPreviousImage();
                else if (e.key === 'ArrowRight') showNextImage();
                else if (e.key === 'Escape') closeOverlayHandler();
            });
            
            function showPreviousImage() {
                currentIndex = (currentIndex - 1 + journeyData.length) % journeyData.length;
                updateGallery();
                createFloatingHeart();
            }
            
            function showNextImage() {
                currentIndex = (currentIndex + 1) % journeyData.length;
                updateGallery();
                createFloatingHeart();
            }
            
            function updateGallery() {
                const currentJourney = journeyData[currentIndex];
                
                // Fade out effect
                imageFrame.style.opacity = '0';
                
                setTimeout(() => {
                    // Update HTML
                    imageFrame.innerHTML = `
                        <img src="${currentJourney.imageUrl}" alt="${currentJourney.title}" class="gallery-image">
                        <div class="description-overlay">
                            <div class="close-overlay">×</div>
                            <h2 class="overlay-title">${currentJourney.title}</h2>
                            <p class="overlay-date">${currentJourney.date}</p>
                            <p class="overlay-description">${currentJourney.description || "Enjoy this lovely moment!"}</p>
                        </div>
                    `;
                    
                    // Re-attach overlay events
                    const overlay = imageFrame.querySelector('.description-overlay');
                    const closeBtn = imageFrame.querySelector('.close-overlay');
                    
                    imageFrame.onclick = toggleOverlay;
                    closeBtn.onclick = (e) => { e.stopPropagation(); closeOverlayHandler(); };
                    overlay.onclick = (e) => { if(e.target === overlay) closeOverlayHandler(); };
                    
                    currentImageSpan.textContent = currentIndex + 1;
                    
                    // Fade in
                    imageFrame.style.opacity = '1';
                    imageFrame.style.animation = 'fadeIn 0.5s ease';
                }, 200);
            }
            
            function toggleOverlay() {
                const overlay = imageFrame.querySelector('.description-overlay');
                overlay.classList.toggle('active');
            }
            
            function closeOverlayHandler() {
                const overlay = imageFrame.querySelector('.description-overlay');
                overlay.classList.remove('active');
            }
            
            function createFloatingHeart() {
                const heart = document.createElement('div');
                heart.innerHTML = '♥';
                heart.style.position = 'fixed';
                heart.style.color = '#ffb6c1';
                heart.style.fontSize = Math.random() * 20 + 15 + 'px';
                heart.style.left = Math.random() * window.innerWidth + 'px';
                heart.style.top = window.innerHeight + 'px';
                heart.style.zIndex = '9999';
                heart.style.pointerEvents = 'none';
                document.body.appendChild(heart);
                
                const animation = heart.animate([
                    { transform: 'translateY(0) scale(1)', opacity: 1 },
                    { transform: `translateY(-${Math.random() * 300 + 200}px) scale(0.5)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2000 + 1000,
                    easing: 'cubic-bezier(0.215, 0.610, 0.355, 1)'
                });
                
                animation.onfinish = () => heart.remove();
            }
            
            // Auto-advance (10 seconds)
            setInterval(showNextImage, 10000);
        });
    </script>
</body>
