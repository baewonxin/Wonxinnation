<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonxin - Space</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Satisfy&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS Variables --- */
        :root {
            --baby-pink: #ffd1dc;
            --baby-yellow: #fff9c4;
            --soft-pink: #ffb6c1;
            --soft-yellow: #fff59d;
            --text-color: #8a5a44;
            --text-dark: #5d4037;
            --white-glass: rgba(255, 255, 255, 0.75);
            --shadow: rgba(138, 90, 68, 0.15);
            --admin-red: #ff6b6b;
            --admin-dark-red: #ff4757;
            --border-radius: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--baby-pink) 0%, var(--baby-yellow) 100%);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            padding-bottom: 2rem;
        }

        h1, h2, h3, .logo {
            font-family: 'Satisfy', cursive;
            font-weight: 400;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- Background Clouds --- */
        .cloud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            box-shadow: 0 8px 16px var(--shadow);
            opacity: 0.8;
        }

        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .c1 { width: 100px; height: 40px; top: 10%; left: -120px; animation: float 25s infinite linear; }
        .c1::after { width: 50px; height: 50px; top: -25px; left: 15px; }
        .c1::before { width: 40px; height: 40px; top: -15px; left: 50px; }

        .c2 { width: 140px; height: 60px; top: 30%; right: -160px; animation: float 35s infinite linear reverse; }
        .c2::after { width: 70px; height: 70px; top: -35px; left: 25px; }
        .c2::before { width: 60px; height: 60px; top: -25px; left: 65px; }

        /* --- Header --- */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--white-glass);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px var(--shadow);
            padding: 1rem 0;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            animation: bounce 3s infinite ease-in-out;
            text-shadow: 2px 2px 0px white;
        }

        nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            padding: 0.5rem;
        }

        nav a {
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px var(--shadow);
            font-size: 0.9rem;
        }

        nav a:hover, nav a.active {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--shadow);
            color: var(--soft-pink);
        }

        /* --- Main Container --- */
        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* --- Admin Panel --- */
        .admin-panel {
            background: var(--white-glass);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px var(--shadow);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .admin-toggle {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toggle-label {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .toggle-label input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider { background-color: var(--admin-red); }
        input:checked + .toggle-slider:before { transform: translateX(24px); }

        .admin-status {
            font-weight: 700;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: #eee;
            color: #888;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .admin-status.active {
            background: var(--admin-red);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
        }

        /* --- Post Form --- */
        .post-form {
            background: white;
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 0 10px 30px var(--shadow);
            margin-bottom: 2rem;
        }

        .post-form h2 {
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            border: 2px solid #eee;
            border-radius: 15px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
            background: #fafafa;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--soft-pink);
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 182, 193, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--soft-pink);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
        }

        .submit-btn:hover {
            background: #ff9eb0;
            transform: translateY(-2px);
        }

        /* --- Messages List --- */
        .messages-section h2 {
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        .message-card {
            background: var(--white-glass);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 5px 15px var(--shadow);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.2s;
            position: relative;
        }

        .message-card:hover {
            transform: translateY(-2px);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px dashed rgba(0,0,0,0.05);
        }

        .message-meta {
            display: flex;
            flex-direction: column;
        }

        .message-author {
            font-weight: 700;
            color: var(--soft-pink);
            font-size: 1.1rem;
        }

        .message-time {
            font-size: 0.8rem;
            color: #999;
            margin-top: 2px;
        }

        .message-content {
            margin-bottom: 1rem;
            font-size: 1.05rem;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .delete-btn {
            background: white;
            color: var(--admin-red);
            border: 1px solid var(--admin-red);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            display: none; 
            transition: all 0.2s;
            white-space: nowrap;
            margin-left: 10px;
        }
        
        .delete-btn:hover {
            background: var(--admin-red);
            color: white;
        }

        /* --- FIXED: Replies Section CSS --- */
        .reply-section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px dashed rgba(0,0,0,0.05);
            
            /* KEY FIX: Ensure vertical stacking */
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .reply-form {
            display: flex;
            gap: 0.5rem;
        }

        .reply-input {
            flex-grow: 1;
            padding: 0.6rem 1rem;
            border: 2px solid #eee;
            border-radius: 20px;
            font-family: inherit;
        }

        .reply-input:focus {
            outline: none;
            border-color: var(--soft-yellow);
        }

        .reply-btn {
            background: var(--baby-yellow);
            border: none;
            border-radius: 20px;
            padding: 0 1.2rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-dark);
            transition: background 0.3s;
            white-space: nowrap;
        }

        .reply-btn:hover { background: var(--soft-yellow); }

        .replies-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            width: 100%; /* Ensure it fills width */
        }

        .reply-card {
            background: rgba(255, 255, 255, 0.6);
            padding: 0.8rem 1rem;
            padding-right: 2rem; /* Extra padding for delete button */
            border-radius: 15px;
            font-size: 0.95rem;
            position: relative; 
            border-left: 4px solid var(--soft-yellow);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .reply-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        .reply-author {
            font-weight: 600;
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .reply-time {
            font-size: 0.75rem;
            color: #aaa;
        }

        .delete-reply-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            color: #ccc;
            border: none;
            width: 24px;
            height: 24px;
            line-height: 24px;
            padding: 0;
            cursor: pointer;
            display: none; 
            font-weight: bold;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .delete-reply-btn:hover {
            color: white;
            background: var(--admin-red);
        }

        /* --- Modal --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.active { display: flex; }

        .password-modal {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .password-input {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            border: 2px solid var(--baby-pink);
            border-radius: 10px;
            font-size: 1rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin: 0 5px;
        }

        .confirm-btn { background: var(--admin-red); color: white; }
        .cancel-btn { background: #eee; color: #666; }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            background: var(--white-glass);
            border-top: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        .hearts {
            font-size: 1.5rem;
            color: var(--soft-pink);
            letter-spacing: 5px;
            margin: 1rem 0;
        }

        /* --- Animations --- */
        @keyframes float {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(100vw); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

        <div class="cloud c1"></div>

    <header>
        <div class="logo">☁️ Wonxin Space ☁️</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="sangwon.html">Sangwon</a>

            <a href="gallary.html">Wonxin Gallery</a>

    <div class="container">
        <!-- Admin Panel -->
        <section class="admin-panel">
            <div class="admin-toggle">
                <span>Admin Mode:</span>
                <label class="toggle-label">
                    <input type="checkbox" id="adminToggle" disabled>

                <button id="adminLoginBtn" class="submit-btn" style="width: auto; padding: 0.5rem 1rem; margin:0;">
                    Login as Admin 🔒
                </button>
            </div>
            <div class="admin-status" id="adminStatus">Inactive</div>
        </section>

        <!-- Post Form -->
        <section class="post-form">
            <h2>Share Your Thoughts 💌</h2>

                    <input type="text" id="author" class="form-control" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="content">Your Message</label>
                    <textarea id="content" class="form-control" placeholder="Ask for fics or yap about Wonxin..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Post Message ✨</button>
            </form>
        </section>

        <!-- Messages List -->
        <section class="messages-section">

    <!-- Password Modal -->
    <div class="modal-overlay" id="passwordModal">
        <div class="password-modal">
            <h2 style="color: var(--admin-red); margin-bottom: 0.5rem;">Admin Authentication</h2>
            <p>Please enter the admin password:</p>
            <input type="password" id="adminPassword" class="password-input" placeholder="Password">
            <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">

                <button class="modal-btn confirm-btn" id="confirmBtn">Login</button>

        </div>
    </div>

    <footer>
        <p>Made with lots of love</p>
        <div class="hearts">
            <span>♥</span><span>♥</span><span>♥</span>
        </div>
        <p>&copy; 2025 by wonxinau. All rights reserved.</p>
    </footer>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const SUPABASE_URL = 'https://duejmhtpcjmnltwgmqlx.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1ZWptaHRwY2ptbmx0d2dtcWx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1MzkzOTksImV4cCI6MjA3ODExNTM5OX0.IOdSLCiUZy7WPp-r2klG8URxAcFodnoIaVhvMnD5Dkk';
            
            let supabase;
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch (e) {
                console.error("Supabase init failed:", e);
            }

            // DOM Elements
            const messageForm = document.getElementById('messageForm');
            const messagesContainer = document.getElementById('messagesContainer');
            const adminToggle = document.getElementById('adminToggle');
            const adminStatus = document.getElementById('adminStatus');
            const adminLoginBtn = document.getElementById('adminLoginBtn');
            const passwordModal = document.getElementById('passwordModal');
            const adminPassword = document.getElementById('adminPassword');
            
            // State
            let isAdminMode = false;
            const ADMIN_PASSWORD = "ohmywonxinyourethebestrealcouple0603";
            
            // Initial Load
            loadMessages();
            setupRealtime();

            // --- Event Listeners ---
            
            messageForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const author = document.getElementById('author').value.trim();
                const content = document.getElementById('content').value.trim();
                
                if (author && content) {
                    const message = {
                        author: author,
                        content: content,
                        replies: [], // Initialize as empty array
                        timestamp: new Date().toISOString() 
                    };
                    
                    const saved = await saveMessage(message);
                    if (saved) {
                        messageForm.reset();
                        showFloatingHearts(5);
                    } else {
                        alert("Could not save to cloud, but saved locally!");
                    }
                }
            });

            adminLoginBtn.addEventListener('click', function() {
                if (isAdminMode) deactivateAdminMode();
                else {
                    passwordModal.classList.add('active');
                    adminPassword.value = '';
                    adminPassword.focus();
                }
            });

            document.getElementById('cancelBtn').addEventListener('click', () => passwordModal.classList.remove('active'));
            
            document.getElementById('confirmBtn').addEventListener('click', function() {
                if (adminPassword.value === ADMIN_PASSWORD) {
                    activateAdminMode();
                    passwordModal.classList.remove('active');
                } else {
                    alert("Incorrect Password!");
                    adminPassword.value = '';
                }
            });

            // --- Logic Functions ---

            function activateAdminMode() {
                isAdminMode = true;
                adminToggle.checked = true;
                adminStatus.textContent = "Active";
                adminStatus.classList.add('active');
                adminLoginBtn.textContent = "Logout 🔓";
                adminLoginBtn.style.background = "#ff4757";
                toggleDeleteButtons(true);
            }

            function deactivateAdminMode() {
                isAdminMode = false;
                adminToggle.checked = false;
                adminStatus.textContent = "Inactive";
                adminStatus.classList.remove('active');
                adminLoginBtn.textContent = "Login as Admin 🔒";
                adminLoginBtn.style.background = "";
                toggleDeleteButtons(false);
            }

            async function saveMessage(message) {
                try {
                    const { data, error } = await supabase
                        .from('messages')
                        .insert([message])
                        .select();
                    
                    if (error) throw error;
                    return true;
                } catch (error) {
                    console.error('Supabase Save Error:', error);
                    // Fallback to LocalStorage
                    let local = JSON.parse(localStorage.getItem('wonxinMessages')) || [];
                    message.id = Date.now(); 
                    local.unshift(message);
                    localStorage.setItem('wonxinMessages', JSON.stringify(local));
                    displayMessage(message); 
                    return false;
                }
            }

            async function loadMessages() {
                try {
                    const { data: messages, error } = await supabase
                        .from('messages')
                        .select('*')
                        .order('timestamp', { ascending: false });
                    
                    if (error) throw error;
                    
                    if (messages && messages.length > 0) {
                        messagesContainer.innerHTML = '';
                        messages.forEach(displayMessage);
                        return;
                    }
                } catch (error) {
                    console.log("Loading from LocalStorage fallback...");
                }

                // Fallback: Load from LocalStorage
                const local = JSON.parse(localStorage.getItem('wonxinMessages')) || [];
                if (local.length > 0) {
                    messagesContainer.innerHTML = '';
                    local.forEach(displayMessage);
                } else {
                    messagesContainer.innerHTML = `<div style="text-align:center; padding: 2rem; color: #888;">No messages yet. Be the first! 💌</div>`;
                }
            }

            function displayMessage(message) {
                if(messagesContainer.innerText.includes("No messages yet")) messagesContainer.innerHTML = '';

                const card = document.createElement('div');
                card.className = 'message-card';
                card.dataset.id = message.id;

                const time = message.timestamp ? new Date(message.timestamp).toLocaleString() : 'Just now';

                // Helper to generate reply HTML
                const repliesHtml = (message.replies || []).map(r => `
                    <div class="reply-card" data-reply-id="${r.id}">
                        <div class="reply-header">
                            <span class="reply-author">${escapeHtml(r.author)}</span>
                            <span class="reply-time">${new Date(r.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="reply-content">${escapeHtml(r.content)}</div>
                        <button class="delete-reply-btn">×</button>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="message-header">
                        <div class="message-meta">
                            <div class="message-author">${escapeHtml(message.author)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                        <button class="delete-btn">Delete 🗑️</button>
                    </div>
                    <div class="message-content">${escapeHtml(message.content)}</div>
                    
                    <div class="reply-section">
                        <div class="reply-form">
                            <input type="text" class="reply-input" placeholder="Write a reply...">
                            <button class="reply-btn">Reply</button>
                        </div>
                        <div class="replies-container">
                            ${repliesHtml}
                        </div>
                    </div>
                `;

                // Reply Event
                const replyBtn = card.querySelector('.reply-btn');
                const replyInput = card.querySelector('.reply-input');
                
                replyBtn.addEventListener('click', () => {
                    const text = replyInput.value.trim();
                    if(text) addReply(message.id, text, replyInput);
                });

                // Delete Event
                const delBtn = card.querySelector('.delete-btn');
                delBtn.addEventListener('click', () => {
                    if(confirm("Delete this message?")) deleteMessage(message.id, card);
                });

                // Delete Reply Events
                card.querySelectorAll('.delete-reply-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const rId = e.target.parentElement.dataset.replyId;
                        if(confirm("Delete reply?")) deleteReplyLogic(message.id, rId, e.target.parentElement);
                    });
                });

                messagesContainer.prepend(card);
                toggleDeleteButtons(isAdminMode);
            }

            // --- FIXED: Reply Logic for JSONB ---
            async function addReply(msgId, content, inputElem) {
                const reply = {
                    id: Date.now(), 
                    author: "Anonymous", 
                    content: content,
                    timestamp: new Date().toISOString()
                };

                try {
                    console.log("Fetching message ID:", msgId);
                    
                    // 1. Fetch the CURRENT message to get the existing replies array
                    const { data: msg, error } = await supabase
                        .from('messages')
                        .select('replies')
                        .eq('id', msgId)
                        .single();
                    
                    if (error) {
                        console.error("Error fetching message for reply:", error);
                        throw error;
                    }
                    if (!msg) {
                        alert("Message not found. It may have been deleted.");
                        return;
                    }

                    // 2. Handle null vs array (Supabase JSONB often returns null if empty)
                    const currentReplies = msg.replies || [];
                    
                    // 3. Create new array
                    const updatedReplies = [...currentReplies, reply];
                    
                    console.log("Updating with replies:", updatedReplies);

                    // 4. Update the database
                    const { error: updateError } = await supabase
                        .from('messages')
                        .update({ replies: updatedReplies })
                        .eq('id', msgId);
                    
                    if (updateError) {
                        console.error("Error updating message:", updateError);
                        throw updateError;
                    }
                    
                    // 5. Optimistic UI Update (Add to screen immediately)
                    const container = inputElem.nextElementSibling;
                    const div = document.createElement('div');
                    div.className = 'reply-card';
                    div.dataset.replyId = reply.id;
                    div.innerHTML = `
                        <div class="reply-header">
                            <span class="reply-author">${reply.author}</span>
                            <span class="reply-time">${new Date().toLocaleString()}</span>
                        </div>
                        <div class="reply-content">${escapeHtml(reply.content)}</div>
                        <button class="delete-reply-btn">×</button>
                    `;
                    
                    const newDelBtn = div.querySelector('.delete-reply-btn');
                    newDelBtn.addEventListener('click', (e) => {
                        if(confirm("Delete reply?")) deleteReplyLogic(msgId, reply.id, div);
                    });
                    newDelBtn.style.display = isAdminMode ? 'block' : 'none';

                    container.appendChild(div);
                    inputElem.value = '';

                } catch (e) {
                    console.error("Failed to save reply:", e);
                    alert("Could not save reply to database. Check console for details.\n\n(Make sure your RLS Policy allows UPDATING the 'replies' column!)");
                }
            }

            async function deleteMessage(id, cardElem) {
                try {
                    await supabase.from('messages').delete().eq('id', id);
                    cardElem.remove();
                } catch (e) {
                    let local = JSON.parse(localStorage.getItem('wonxinMessages')) || [];
                    local = local.filter(m => m.id != id);
                    localStorage.setItem('wonxinMessages', JSON.stringify(local));
                    cardElem.remove();
                }
            }

            async function deleteReplyLogic(msgId, replyId, replyElem) {
                try {
                    const { data: msg, error } = await supabase
                        .from('messages')
                        .select('replies')
                        .eq('id', msgId)
                        .single();
                    
                    if (error) throw error;

                    // Filter out the reply
                    const updatedReplies = (msg.replies || []).filter(r => r.id != replyId);
                    
                    await supabase.from('messages').update({ replies: updatedReplies }).eq('id', msgId);
                    
                    replyElem.remove();
                } catch(e) { 
                    console.error(e); 
                    alert("Failed to delete reply.");
                }
            }

            function toggleDeleteButtons(show) {
                document.querySelectorAll('.delete-btn, .delete-reply-btn').forEach(b => {
                    b.style.display = show ? 'block' : 'none';
                });
            }

            function setupRealtime() {
                if(!supabase) return;
                supabase.channel('messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    displayMessage(payload.new);
                })
                .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, payload => {
                    const el = document.querySelector(`.message-card[data-id="${payload.old.id}"]`);
                    if(el) el.remove();
                })
                // FIX: Listen for UPDATES so replies appear in real-time
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, payload => {
                    const el = document.querySelector(`.message-card[data-id="${payload.new.id}"]`);
                    if(el) {
                        // Re-render the card to show new replies
                        el.remove();
                        displayMessage(payload.new);
                    }
                })
                .subscribe();
            }

            function escapeHtml(text) {
                if(!text) return "";
                return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            }

            function showFloatingHearts(count) {
                for(let i=0; i<count; i++) {
                    const h = document.createElement('div');
                    h.innerHTML = '♥';
                    h.style.position = 'fixed';
                    h.style.color = '#ffb6c1';
                    h.style.fontSize = (Math.random() * 20 + 10) + 'px';
                    h.style.left = Math.random() * window.innerWidth + 'px';
                    h.style.top = window.innerHeight + 'px';
                    h.style.zIndex = '9999';
                    h.style.pointerEvents = 'none';
                    document.body.appendChild(h);
                    
                    const anim = h.animate([
                        { transform: 'translateY(0)', opacity: 1 },
                        { transform: `translateY(-${Math.random()*300+100}px)`, opacity: 0 }
                    ], { duration: 2000, easing: 'ease-out' });
                    
                    anim.onfinish(() => h.remove());
                }
            }
        });
    </script>
</body>
